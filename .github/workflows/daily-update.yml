name: Adyen Monitor — Daily Update

on:
  schedule:
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run monitor
        run: python Adyen_monitor.py

      - name: Commit & push
        run: |
          git config user.name "Adyen Monitor Bot"
          git config user.email "bot@adyen-monitor.local"
          git add data/ index.html
          git diff --cached --quiet || git commit -m "📊 Daily update $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
```

Commit.

