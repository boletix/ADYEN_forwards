ADYEN_forwards/
├── .github/
│   └── workflows/
│       └── daily-update.yml
├── .gitignore
├── Adyen_monitor.py
└── README.md
```

---

### Paso 4 — Activar GitHub Pages

1. Ve a **Settings** (pestaña arriba a la derecha del repo)
2. En el menú izquierdo → **Pages**
3. Donde dice "Source" → selecciona **GitHub Actions**
4. Guarda

---

### Paso 5 — Ejecutar el workflow por primera vez

1. Ve a la pestaña **Actions** (arriba, junto a "Pull requests")
2. En la barra izquierda verás **"Adyen Monitor — Daily Update"**
3. Haz clic en ese workflow
4. Arriba a la derecha aparece el botón **"Run workflow"** → haz clic → **"Run workflow"** (botón verde)
5. Espera ~2 minutos. Verás un círculo amarillo que se pone verde cuando termina.

Si sale verde, el workflow ha hecho dos cosas:
- Ha commiteado `data/` e `index.html` al repo automáticamente
- Ha deployado la web a GitHub Pages

